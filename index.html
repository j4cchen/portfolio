<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #111;
    }

    .hero {
      width: 100%;
      height: 320px;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.pexels.com/photos/7568298/pexels-photo-7568298.jpeg?_gl=1*2qap0t*_ga*MTAwMDEwNzAzMS4xNzczNzk3OTkx*_ga_8JE65Q40S6*czE3NzM3OTc5OTEkbzEkZzEkdDE3NzM3OTgwMTEkajQwJGwwJGgw') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    .hero-content {
      max-width: 700px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 15px;
    }

    .hero .hero-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .hero .hero-btn:hover {
      background: #0ea5e9;
    }

    .hero h1 {
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 6px;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      background: #007BFF;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <h1>Jeffrey Chen</h1>
    <p>HTML Email Developer specializing in responsive, cross-client compatible email templates.</p>
  </div>
</div>

<div id="work" class="container">
  <div class="grid">

    <div class="card">
      <img src="assets/Email Template with Table.png" alt="Email Preview">
      <div class="card-content">
        <div class="card-title">Email Template with Table</div>
        <a href="emails/Email Template with Table.html" target="_blank">View Email</a>
      </div>
    </div>

    <div class="card">
      <img src="assets/Email Template with Rows.png" alt="Email Preview">
      <div class="card-content">
        <div class="card-title">Email Template with Rows</div>
        <a href="emails/Email Template with Rows.html" target="_blank">View Email</a>
      </div>
    </div>

    <div class="card">
      <img src="assets/Email Template with Circle Points.png" alt="Email Preview">
      <div class="card-content">
        <div class="card-title">Email Template with Circle Points</div>
        <a href="emails/Email Template with Circle Points.html" target="_blank">View Email</a>
      </div>
    </div>

    <div class="card">
      <img src="assets/Happy Mortgage.png" alt="Email Preview">
      <div class="card-content">
        <div class="card-title">Welcome Email</div>
        <a href="emails/Happy Mortgage.html" target="_blank">View Email</a>
      </div>
    </div>

    <div class="card">
      <img src="assets/template-0.png" alt="Email Preview">
      <div class="card-content">
        <div class="card-title">Email Template</div>
        <a href="emails/template-0.html" target="_blank">View Email</a>
      </div>
    </div>

  </div>
</div>

<script>
  // Smooth scroll behavior
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });

  // Simple fade-in animation on scroll
  const cards = document.querySelectorAll('.card');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = 1;
        entry.target.style.transform = 'translateY(0)';
      }
    });
  });

  cards.forEach(card => {
    card.style.opacity = 0;
    card.style.transform = 'translateY(20px)';
    card.style.transition = 'all 0.5s ease';
    observer.observe(card);
  });
</script>

</body>
</html>
